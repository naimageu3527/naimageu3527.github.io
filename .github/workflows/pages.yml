name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A6CD30: ${{ secrets.A6CD30 }}
          B883E7: ${{ secrets.B883E7 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A6CD30', '')
          bm = os.environ.get('B883E7', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- e5d3cb77ec98ef615d58c3 -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 2cbf0cb91dc2bf48e4b2a16cdf84b0d94d0577507eeeacd4 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
